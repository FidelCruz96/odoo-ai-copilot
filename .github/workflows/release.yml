name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version tag, for example v0.4.0"
        required: true
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version
        run: |
          case "${{ inputs.version }}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Version must look like v0.4.0"; exit 1 ;;
          esac

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          prerelease: ${{ inputs.prerelease == 'true' }}
          generate_release_notes: true
