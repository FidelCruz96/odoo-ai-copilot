services:
  web:
    environment:
      AI_SERVICE_URL: http://ai_service:8000/v1/ask

  db_knowledge:
    image: pgvector/pgvector:pg16
    container_name: ${KNOWLEDGE_DB_CONTAINER_NAME:-ai_knowledge_db_test}
    environment:
      POSTGRES_DB: knowledge_db
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${KNOWLEDGE_DB_PORT:-5434}:5432"
    volumes:
      - knowledge_db_data:/var/lib/postgresql/data

  ai_service:
    environment:
      KNOWLEDGE_DATABASE_URL: postgresql://odoo:odoo@db_knowledge:5432/knowledge_db
      TOP_K: ${TOP_K:-5}
      SIMILARITY_THRESHOLD: ${SIMILARITY_THRESHOLD:-0.70}
      RAG_CONTEXT_CHUNKS: ${RAG_CONTEXT_CHUNKS:-3}
      RAG_CONTEXT_CHARS: ${RAG_CONTEXT_CHARS:-500}
      RAG_MAX_COMPLETION_TOKENS: ${RAG_MAX_COMPLETION_TOKENS:-220}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-large}

volumes:
  knowledge_db_data:
