<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Odoo AI Copilot Architecture</title>
  <desc id="desc">Architecture diagram showing Odoo, FastAPI AI Service, hybrid orchestrator, read-only Odoo tools, and optional Knowledge RAG.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fa; }
      .panel { fill: #ffffff; stroke: #d9dee7; stroke-width: 2; rx: 14; }
      .node { fill: #ffffff; stroke: #2f5d8c; stroke-width: 2; rx: 10; }
      .node-dark { fill: #17324d; stroke: #17324d; stroke-width: 2; rx: 10; }
      .node-accent { fill: #f2fbf7; stroke: #2f8f64; stroke-width: 2; rx: 10; }
      .node-warn { fill: #fff8e8; stroke: #b87912; stroke-width: 2; rx: 10; }
      .title { fill: #132238; font-family: Arial, sans-serif; font-size: 30px; font-weight: 700; }
      .subtitle { fill: #42526e; font-family: Arial, sans-serif; font-size: 16px; }
      .text { fill: #172b4d; font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; }
      .small { fill: #42526e; font-family: Arial, sans-serif; font-size: 13px; }
      .white { fill: #ffffff; font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; }
      .white-small { fill: #dce9f5; font-family: Arial, sans-serif; font-size: 13px; }
      .arrow { stroke: #42526e; stroke-width: 2.4; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 7 7; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#42526e"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="720"/>
  <text class="title" x="64" y="62">Odoo AI Copilot</text>
  <text class="subtitle" x="64" y="91">Hybrid orchestrator for ERP data, Knowledge/RAG, memory, validation, and deterministic responses.</text>

  <rect class="panel" x="50" y="125" width="250" height="470"/>
  <text class="text" x="80" y="165">Odoo 18</text>
  <rect class="node" x="78" y="195" width="194" height="78"/>
  <text class="text" x="104" y="230">AI Copilot UI</text>
  <text class="small" x="104" y="252">custom addon</text>
  <rect class="node" x="78" y="315" width="194" height="78"/>
  <text class="text" x="106" y="350">/ai/schema</text>
  <text class="small" x="106" y="372">allowed metadata</text>
  <rect class="node" x="78" y="435" width="194" height="78"/>
  <text class="text" x="106" y="470">/ai/get_data</text>
  <text class="small" x="106" y="492">read-only ORM</text>

  <rect class="panel" x="392" y="125" width="504" height="470"/>
  <text class="text" x="422" y="165">FastAPI AI Service</text>
  <rect class="node-dark" x="422" y="195" width="190" height="80"/>
  <text class="white" x="460" y="230">POST /v1/ask</text>
  <text class="white-small" x="456" y="252">versioned contract</text>
  <rect class="node-accent" x="676" y="195" width="190" height="80"/>
  <text class="text" x="722" y="230">Auth</text>
  <text class="small" x="704" y="252">service token</text>

  <rect class="node" x="422" y="320" width="444" height="150"/>
  <text class="text" x="470" y="355">Hybrid Orchestrator</text>
  <text class="small" x="470" y="383">normalize -> resolve entity/domain/intent</text>
  <text class="small" x="470" y="408">memory -> route selection -> plan builder</text>
  <text class="small" x="470" y="433">tool executor -> response composer</text>

  <rect class="node-warn" x="422" y="505" width="444" height="60"/>
  <text class="text" x="470" y="540">Metrics + Evidence</text>
  <text class="small" x="628" y="540">trace_id, tools, latency, grounded, faithful</text>

  <rect class="panel" x="988" y="125" width="242" height="470"/>
  <text class="text" x="1018" y="165">External Context</text>
  <rect class="node-accent" x="1018" y="205" width="184" height="82"/>
  <text class="text" x="1064" y="240">Odoo ORM</text>
  <text class="small" x="1052" y="262">live ERP data</text>
  <rect class="node-accent" x="1018" y="350" width="184" height="82"/>
  <text class="text" x="1060" y="385">pgvector</text>
  <text class="small" x="1052" y="407">Knowledge/RAG</text>
  <rect class="node-accent" x="1018" y="495" width="184" height="58"/>
  <text class="text" x="1040" y="530">OpenAI API</text>

  <path class="arrow" d="M272 234 C328 234, 360 234, 422 234"/>
  <text class="small" x="310" y="220">/v1/ask</text>
  <path class="arrow" d="M612 235 L676 235"/>
  <path class="arrow" d="M644 275 L644 320"/>
  <path class="arrow" d="M422 390 C335 390, 323 355, 272 355"/>
  <path class="arrow" d="M272 474 C335 474, 350 430, 422 430"/>
  <path class="arrow" d="M866 380 C930 380, 950 246, 1018 246"/>
  <path class="arrow dashed" d="M866 430 C930 430, 950 392, 1018 392"/>
  <path class="arrow dashed" d="M1110 495 L1110 432"/>

  <rect class="node-dark" x="402" y="630" width="478" height="46"/>
  <text class="white" x="430" y="660">Routes: erp_data | knowledge | mixed | clarification | fallback</text>
</svg>
