services:
  web:
    container_name: ${ODOO_CONTAINER_NAME}
    image: dockerodoo:${ODOO_VERSION}
    depends_on:
      - db
    ports:
      - "${ODOO_PORT}:8069"
    volumes:
      - ./config:/etc/odoo
      - ${ODOO_SERVER}:/var/lib/odoo/odoo
      - ${ODOO_DATA}:/var/lib/odoo/odoo/data
      - ${CUSTOM_ADDONS}:/var/lib/odoo/custom_addons
      - ${ENTERPRISE_ADDONS}:/var/lib/odoo/enterprise
    environment:
      - AI_REQUIRE_SERVICE_TOKEN=${AI_REQUIRE_SERVICE_TOKEN:-true}
      - AI_SERVICE_TOKEN=${ODOO_AI_TOKEN}
  db:
    container_name: ${PG_CONTAINER_NAME}
    image: postgres:${PG_VERSION}
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_USER=${PG_USER}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - ${PG_PORT}:5432
    volumes:
      - ./db:/mnt/db

  ai_service:
    container_name: ai_service
    build: ./odoo_ai_service
    ports:
      - "8000:8000"
    depends_on:
      - web
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ODOO_BASE_URL=${ODOO_BASE_URL}
      - ODOO_URL=${ODOO_URL}
      - ODOO_DB=${ODOO_DB}
      - ODOO_AI_TOKEN=${ODOO_AI_TOKEN}
