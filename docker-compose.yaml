services:
  web:
    container_name: ${ODOO_CONTAINER_NAME}
    image: dockerodoo:${ODOO_VERSION}
    depends_on:
      - db
    ports:
      - "${ODOO_PORT}:8069"
    volumes:
      - ./config:/etc/odoo
      - ${ODOO_SERVER}:/var/lib/odoo/odoo
      - ${ODOO_DATA}:/var/lib/odoo/odoo/data
      - ${CUSTOM_ADDONS}:/var/lib/odoo/custom_addons
      - ${ENTERPRISE_ADDONS}:/var/lib/odoo/enterprise
    environment:
      - AI_REQUIRE_SERVICE_TOKEN=${AI_REQUIRE_SERVICE_TOKEN:-true}
      - AI_SERVICE_TOKEN=${ODOO_AI_TOKEN}
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://ai_service:8000/v1/ask}
  db:
    container_name: ${PG_CONTAINER_NAME}
    image: postgres:${PG_VERSION}
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_USER=${PG_USER}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - ${PG_PORT}:5432
    volumes:
      - ./db:/mnt/db

  ai_service:
    container_name: ${AI_SERVICE_CONTAINER_NAME:-ai_service_test}
    build: ./odoo_ai_service
    ports:
      - "${AI_SERVICE_PORT:-8001}:8000"
    depends_on:
      - web
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_SERVICE_API_KEY=${ODOO_AI_TOKEN}
      - AI_SERVICE_AUTH_REQUIRED=${AI_SERVICE_AUTH_REQUIRED:-true}
      - ODOO_BASE_URL=${ODOO_BASE_URL}
      - ODOO_URL=${ODOO_URL}
      - ODOO_DB=${ODOO_DB}
      - ODOO_AI_TOKEN=${ODOO_AI_TOKEN}
      - MEMORY_STORE=${MEMORY_STORE:-in_memory}
      - MEMORY_TTL_SECONDS=${MEMORY_TTL_SECONDS:-86400}
      - MEMORY_DATABASE_URL=${MEMORY_DATABASE_URL:-}
